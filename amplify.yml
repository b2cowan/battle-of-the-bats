version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install -g pnpm@9
        - rm -rf node_modules
        - pnpm install
    build:
      commands:
        - echo "SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY" >> .env.production
        - echo "RESEND_API_KEY=$RESEND_API_KEY" >> .env.production
        - echo "RESEND_FROM=$RESEND_FROM" >> .env.production
        - echo "PLATFORM_ADMIN_EMAILS=$PLATFORM_ADMIN_EMAILS" >> .env.production
        - echo "OBSERVABILITY_ENV=$OBSERVABILITY_ENV" >> .env.production
        - echo "NEXT_PUBLIC_APP_URL=$NEXT_PUBLIC_APP_URL" >> .env.production
        - echo "STRIPE_SECRET_KEY=$STRIPE_SECRET_KEY" >> .env.production
        - echo "STRIPE_WEBHOOK_SECRET=$STRIPE_WEBHOOK_SECRET" >> .env.production
        # Web Push (VAPID). Public key is inlined into the client bundle at build
        # time (browser subscribe needs it); private key + email are read by the
        # server at runtime to sign pushes. Without these, push silently no-ops.
        - echo "NEXT_PUBLIC_VAPID_PUBLIC_KEY=$NEXT_PUBLIC_VAPID_PUBLIC_KEY" >> .env.production
        - echo "VAPID_PRIVATE_KEY=$VAPID_PRIVATE_KEY" >> .env.production
        - echo "VAPID_EMAIL=$VAPID_EMAIL" >> .env.production
        # Webpack production build (next build --webpack) uses far more heap than the
        # Turbopack default and OOMs the build worker on the 8GiB Standard instance.
        # NODE_OPTIONS is inherited by Next's build workers; raise the old-space limit.
        - NODE_OPTIONS=--max-old-space-size=6144 pnpm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .pnpm-store/**/*
      - .next/cache/**/*
