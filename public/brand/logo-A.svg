<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@900&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#0a0a0f"/>

  <!-- Blueprint-blue structural border frame -->
  <rect x="0" y="0" width="512" height="512"
        fill="none" stroke="#1E3A8A" stroke-width="12"/>

  <!-- Thin lime accent line at top -->
  <rect x="0" y="0" width="512" height="4" fill="#D9F99D"/>

  <!-- HQ lettermark -->
  <text
    x="256" y="308"
    font-family="'Barlow Condensed', 'Arial Narrow', Impact, sans-serif"
    font-weight="900"
    font-size="248"
    fill="#D9F99D"
    text-anchor="middle"
    letter-spacing="-4">HQ</text>

  <!-- Platform name wordmark below -->
  <text
    x="256" y="390"
    font-family="'Barlow Condensed', 'Arial Narrow', Impact, sans-serif"
    font-weight="900"
    font-size="28"
    fill="#1E3A8A"
    text-anchor="middle"
    letter-spacing="10">FIELDLOGICHQ</text>
</svg>
