<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    FieldLogicHQ MASKABLE app icon source — Android adaptive-icon (circle-cropped).

    Purpose-built variant of logo-B (the FL monogram): the base logo-B bakes a border
    frame at the canvas edge + an "HQ" in the top-right corner, both of which sit where
    Android's ~80% circle mask clips them ("looks broken" on some launchers). This source
    DROPS the border, the corner "HQ", and the corner triangle/lime accents, and CENTERS
    the FL monogram + a centered lime accent bar so nothing lands in the clipped corners.

    Full-bleed pitch-black bg = matched-background (the seamless principle, design_decisions
    2026-06-24) so the safe-zone padding the generator adds stays invisible. See
    memory/design_decisions.md 2026-07-06.
  -->

  <!-- Background (full-bleed, matched) -->
  <rect width="512" height="512" fill="#0a0a0f"/>

  <!-- Centered lime accent bar (recentred from logo-B's left-anchored bar) -->
  <rect x="132" y="308" width="248" height="4" fill="#D9F99D" opacity="0.55"/>

  <!-- Centered FL monogram — exact logo-B path data, shifted +63px to centre horizontally -->
  <g transform="translate(63,0)">
    <!-- F (top of stacked monogram) -->
    <path fill="#D9F99D" d="M231.900 124.740Q231.900 126.070 231.140 126.830Q230.380 127.590 229.050 127.590L192.760 127.590Q191.620 127.590 191.620 128.730L191.620 146.970Q191.620 148.110 192.760 148.110L211.570 148.110Q212.900 148.110 213.660 148.870Q214.420 149.630 214.420 150.960L214.420 175.850Q214.420 177.180 213.660 177.940Q212.900 178.700 211.570 178.700L192.760 178.700Q191.620 178.700 191.620 179.840L191.620 227.150Q191.620 228.480 190.860 229.240Q190.100 230 188.770 230L158.750 230Q157.420 230 156.660 229.240Q155.900 228.480 155.900 227.150L155.900 99.850Q155.900 98.520 156.660 97.760Q157.420 97 158.750 97L229.050 97Q230.380 97 231.140 97.760Q231.900 98.520 231.900 99.850"/>
    <!-- L (bottom of stacked monogram) -->
    <path fill="#D9F99D" d="M157.420 418Q156.090 418 155.330 417.240Q154.570 416.480 154.570 415.150L154.570 287.850Q154.570 286.520 155.330 285.760Q156.090 285 157.420 285L187.440 285Q188.770 285 189.530 285.760Q190.290 286.520 190.290 287.850L190.290 386.270Q190.290 387.410 191.430 387.410L228.480 387.410Q229.810 387.410 230.570 388.170Q231.330 388.930 231.330 390.260L231.330 415.150Q231.330 416.480 230.570 417.240Q229.810 418 228.480 418"/>
