<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!--
    FieldLogicHQ favicon — the "logic mark" (">") in logic-lime on pitch-black.
    Pure geometry: no font dependency, renders identically at all sizes.
    Works as browser tab favicon, bookmark icon, and PWA shortcut icon.
  -->

  <!-- Background -->
  <rect width="32" height="32" fill="#0a0a0f"/>

  <!-- Blueprint-blue structural border -->
  <rect x="0" y="0" width="32" height="32"
        fill="none" stroke="#1E3A8A" stroke-width="2"/>

  <!-- ">" chevron — logic mark -->
  <!-- Upper arm: top-left to apex -->
  <!-- Lower arm: apex to bottom-left -->
  <polyline
    points="7,5 23,16 7,27"
    fill="none"
    stroke="#D9F99D"
    stroke-width="4.5"
    stroke-linecap="square"
    stroke-linejoin="miter"/>
</svg>
